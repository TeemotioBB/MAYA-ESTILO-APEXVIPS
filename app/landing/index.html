<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Conteúdo Exclusivo</title>

<!-- ════════════════════════════════════════════════════════════════════════ -->
<!-- META PIXEL — substitua YOUR_PIXEL_ID pelo seu pixel real                 -->
<!-- ════════════════════════════════════════════════════════════════════════ -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');
fbq('init', 'YOUR_PIXEL_ID');
fbq('track', 'PageView');
</script>
<noscript><img height="1" width="1" style="display:none"
src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID&ev=PageView&noscript=1"/></noscript>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0a0a0a;
    color: #fff;
    overflow: hidden;
}
.wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 24px;
    text-align: center;
    background: radial-gradient(ellipse at center, #1a0a1a 0%, #0a0a0a 70%);
}
.title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #ff3d7f, #ff8b3d);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}
.subtitle { font-size: 16px; color: #aaa; margin-bottom: 40px; max-width: 320px; }
.btn {
    display: inline-block;
    padding: 18px 48px;
    background: linear-gradient(135deg, #ff3d7f, #ff8b3d);
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(255, 61, 127, 0.4);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    text-decoration: none;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(255, 61, 127, 0.5); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.6; cursor: wait; }
.footer { position: absolute; bottom: 16px; font-size: 11px; color: #555; }
.spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="wrap">
    <div class="title">Acesso Exclusivo 🔥</div>
    <div class="subtitle">Conteúdo +18 sem censura. Clique abaixo pra ver.</div>
    <button id="ctaBtn" class="btn" onclick="goToBot()">Ver Conteúdo</button>
    <div class="footer">+18 anos. Conteúdo adulto.</div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════════════
   CAPTURA DE PARÂMETROS — fbp, fbclid, UTMs
   ════════════════════════════════════════════════════════════════════════ */

function getCookie(name) {
    const m = document.cookie.match("(^|;)\\s*" + name + "\\s*=\\s*([^;]+)");
    return m ? decodeURIComponent(m.pop()) : null;
}
function getQueryParam(name) {
    return new URLSearchParams(window.location.search).get(name);
}

/* Gera UUID v4 simples — usado como event_id pra deduplicar Pixel <-> CAPI */
function uuid() {
    return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
        (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c/4).toString(16)
    );
}

async function goToBot() {
    const btn = document.getElementById("ctaBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Carregando...';

    /* Espera o Pixel terminar de setar o _fbp (até 2s) — quando o site é
       acessado pela 1ª vez, o cookie só é criado depois que fbevents.js
       roda. Tentamos algumas vezes em curto intervalo. */
    let fbp = null;
    for (let i = 0; i < 20 && !fbp; i++) {
        fbp = getCookie("_fbp");
        if (!fbp) await new Promise(r => setTimeout(r, 100));
    }

    const fbclid = getQueryParam("fbclid");
    const eventId = uuid();   // dedup Pixel <-> CAPI

    /* Dispara ViewContent no Pixel com event_id — o backend dispara o
       mesmo evento com o MESMO event_id via CAPI; Meta deduplica. */
    if (window.fbq) {
        try {
            fbq("track", "ViewContent", {}, {eventID: eventId});
        } catch(e) { /* silencioso */ }
    }

    const payload = {
        event_id:        eventId,
        fbp:             fbp || "",
        fbclid:          fbclid || "",
        page_url:        window.location.href,
        user_agent:      navigator.userAgent,
        utm_source:      getQueryParam("utm_source"),
        utm_medium:      getQueryParam("utm_medium"),
        utm_campaign:    getQueryParam("utm_campaign"),
        utm_content:     getQueryParam("utm_content"),
        utm_term:        getQueryParam("utm_term"),
    };

    try {
        const resp = await fetch("/api/track", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload),
        });
        const data = await resp.json();
        if (data && data.bot_url) {
            window.location.href = data.bot_url;
            return;
        }
        throw new Error(data.error || "resposta inválida");
    } catch (err) {
        console.error("Erro registrando tracking:", err);
        /* Fallback: redireciona sem tracking_id (perde rastreamento, mas
           garante que o usuário chega no bot mesmo se o backend falhar) */
        window.location.href = "FALLBACK_BOT_URL";
    }
}
</script>

</body>
</html>
